<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4F72">
<title>Tac AUC Calculator</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Tac AUC&quot;,&quot;short_name&quot;:&quot;TacAUC&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23f8f9fa&quot;,&quot;theme_color&quot;:&quot;%231B4F72&quot;}">
<style>
  :root {
    --primary: #1B4F72;
    --accent: #2E75B6;
    --green: #27ae60;
    --orange: #f39c12;
    --red: #e74c3c;
    --darkred: #8e1600;
    --bg: #f8f9fa;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a2e;
    --text2: #6b7280;
    --inputbg: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --card: #1a1d28;
      --border: #2d3040;
      --text: #e8e8ed;
      --text2: #8b8fa3;
      --inputbg: #252836;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .container { max-width: 640px; margin: 0 auto; padding: 12px; }
  .header { text-align: center; padding: 16px 0 12px; }
  .header h1 { font-size: 20px; font-weight: 700; color: var(--primary); }
  .header p { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .tabs { display: flex; gap: 2px; border-bottom: 2px solid var(--border); margin-bottom: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text2); white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .card h3 { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .card .sub { font-size: 10px; color: var(--text2); margin-bottom: 10px; line-height: 1.4; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 90px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
  .field input { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--inputbg); color: var(--text); font-size: 14px; font-family: inherit; outline: none; -webkit-appearance: none; }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(46,117,182,0.15); }
  .badge { border-radius: 10px; padding: 12px; text-align: center; flex: 1; min-width: 130px; }
  .badge .lbl { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .badge .val { font-size: 24px; font-weight: 700; margin: 4px 0; }
  .badge .unit { font-size: 10px; color: var(--text2); }
  .badge .status { font-size: 11px; font-weight: 600; margin-top: 3px; }
  .tag { display: inline-block; font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .alert { padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-top: 8px; }
  .phase-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .phase-btn { padding: 5px 12px; border-radius: 18px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); transition: all 0.15s; }
  .phase-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { background: var(--primary); color: #fff; padding: 7px 8px; text-align: left; font-weight: 600; }
  td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
  tr:nth-child(even) { background: color-mix(in srgb, var(--card) 92%, var(--border)); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .tp-input { display: flex; align-items: center; gap: 6px; }
  .tp-input span { font-size: 11px; font-weight: 600; color: var(--text2); min-width: 48px; }
  .tp-input input { flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--inputbg); color: var(--text); font-size: 12px; font-family: inherit; outline: none; -webkit-appearance: none; }
  .btn-clear { margin-top: 8px; padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; }
  .footer { text-align: center; font-size: 9px; color: var(--text2); padding: 12px 0; border-top: 1px solid var(--border); margin-top: 14px; }
  .pk-params { margin-top: 8px; padding: 8px; border-radius: 8px; background: color-mix(in srgb, var(--card) 90%, var(--border)); font-size: 11px; }
  .pk-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-top: 4px; }
  .interp-section { font-size: 12px; line-height: 1.8; }
  .interp-section div { padding: 2px 0; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Tacrolimus AUC Calculator</h1>
    <p>LSS Equations · Full Trapezoidal AUC · C/D Ratio · CMIA Platform</p>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
  <div class="footer">Clinical decision support tool. Targets assume immunoassay (CMIA/ECLIA). Not a substitute for clinical judgment.</div>
</div>

<script>
const TABS = ["LSS Calculator", "Full AUC (Study)", "C/D Ratio", "Reference"];
const TARGETS = [
  { phase: "Month 0–3", min: 120, max: 180, c0Min: 10, c0Max: 15 },
  { phase: "Month 3–12", min: 80, max: 120, c0Min: 6, c0Max: 10 },
  { phase: ">12 months", min: 60, max: 100, c0Min: 5, c0Max: 8 },
];
const TP_LABELS = ["0","0.5","1","1.5","2","3","4","6","8","10","12"];

let state = { tab: 0, phase: 0, lss: { c0:"",c1:"",c1_5:"",c2:"",c4:"" }, cd: { c0:"",dose:"" }, fullPts: TP_LABELS.map(t => ({ time: t, conc: "" })) };

function $(id) { return document.getElementById(id); }
function aucStatus(auc, t) {
  if (!t) return { label:"", color:"#888" };
  if (auc < t.min) return { label:"Below target", color:"#e74c3c" };
  if (auc > t.max) return { label:"Above target", color:"#e67e22" };
  return { label:"Within target", color:"#27ae60" };
}
function cdClass(cd) {
  if (cd >= 1.55) return { label:"Slow Metabolizer", color:"#27ae60", action:"Standard protocol" };
  if (cd >= 1.05) return { label:"Intermediate", color:"#f39c12", action:"Monitor closely — many behave as fast" };
  if (cd >= 0.8) return { label:"Fast Metabolizer", color:"#e74c3c", action:"Activate fast-metabolizer protocol" };
  return { label:"Very Rapid", color:"#8e1600", action:"Act urgently — high peak toxicity risk" };
}
function c2Class(v) {
  if (v <= 20) return { label:"Acceptable peak", color:"#27ae60" };
  if (v <= 30) return { label:"Probable peak toxicity", color:"#f39c12" };
  return { label:"URGENT — toxic spikes every dose", color:"#e74c3c" };
}
function trapAUC(pts) {
  const s = pts.filter(p => p.conc !== "" && !isNaN(parseFloat(p.conc))).sort((a,b) => parseFloat(a.time)-parseFloat(b.time));
  if (s.length < 2) return null;
  let auc = 0;
  for (let i=1;i<s.length;i++) {
    const dt=parseFloat(s[i].time)-parseFloat(s[i-1].time), c1v=parseFloat(s[i-1].conc), c2v=parseFloat(s[i].conc);
    if (c1v>0 && c2v>0 && c1v!==c2v) auc += dt*(c1v-c2v)/Math.log(c1v/c2v);
    else auc += dt*(c1v+c2v)/2;
  }
  return auc;
}
function badge(lbl, val, unit, status) {
  const sv = val !== null ? (typeof val==="number"?val.toFixed(1):val) : "—";
  return `<div class="badge" style="background:${status.color}10;border:2px solid ${status.color}">
    <div class="lbl">${lbl}</div><div class="val" style="color:${status.color}">${sv}</div>
    ${unit?`<div class="unit">${unit}</div>`:""}
    ${status.label?`<div class="status" style="color:${status.color}">${status.label}</div>`:""}
  </div>`;
}
function phaseSelector() {
  return `<div style="margin-bottom:8px"><label style="font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px">Post-Transplant Phase</label>
  <div class="phase-btns">${TARGETS.map((t,i)=>`<button class="phase-btn ${state.phase===i?"active":""}" onclick="setPhase(${i})">${t.phase} (${t.min}–${t.max})</button>`).join("")}</div></div>`;
}

function render() {
  // Tabs
  $("tabs").innerHTML = TABS.map((t,i) => `<button class="tab ${state.tab===i?"active":""}" onclick="setTab(${i})">${t}</button>`).join("");

  const tgt = TARGETS[state.phase];
  const L = state.lss;
  let html = "";

  if (state.tab === 0) {
    const indian = L.c0!==""&&L.c1_5!=="" ? 19.16+6.75*parseFloat(L.c0||0)+3.33*parseFloat(L.c1_5||0) : null;
    const wong = L.c2!==""&&L.c4!=="" ? 16.2+2.4*parseFloat(L.c2||0)+5.9*parseFloat(L.c4||0) : null;
    const schol = L.c0!==""&&L.c1!==""&&L.c4!=="" ? 8.90+4.0*parseFloat(L.c0||0)+1.77*parseFloat(L.c1||0)+5.47*parseFloat(L.c4||0) : null;
    const c2v = parseFloat(L.c2);

    html = phaseSelector();
    // Indian
    html += `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3>Indian Equation (C0 + C1.5)</h3><span class="tag" style="background:#27ae6020;color:#27ae60">RECOMMENDED</span></div>
    <div class="sub">AUC₀₋₁₂ = 19.16 + 6.75 × C0 + 3.33 × C1.5 &nbsp;|&nbsp; Wait: 90 min &nbsp;|&nbsp; r² = 0.929</div>
    <div class="row"><div class="field"><label>C0 (trough) ng/mL</label><input type="number" step="0.1" value="${L.c0}" oninput="setLSS('c0',this.value)" placeholder="0.0"></div>
    <div class="field"><label>C1.5 (90 min) ng/mL</label><input type="number" step="0.1" value="${L.c1_5}" oninput="setLSS('c1_5',this.value)" placeholder="0.0"></div></div>
    ${indian!==null?`<div class="row">${badge("Indian AUC₀₋₁₂",indian,"µg·h/L",aucStatus(indian,tgt))}</div>`:""}</div>`;

    // Wong
    html += `<div class="card"><h3>Wong Equation (C2 + C4)</h3>
    <div class="sub">AUC₀₋₁₂ = 16.2 + 2.4 × C2 + 5.9 × C4 &nbsp;|&nbsp; Wait: 4 hr &nbsp;|&nbsp; r² = 0.93 &nbsp;|&nbsp; CMIA validated</div>
    <div class="row"><div class="field"><label>C2 (2 hr) ng/mL</label><input type="number" step="0.1" value="${L.c2}" oninput="setLSS('c2',this.value)" placeholder="0.0"></div>
    <div class="field"><label>C4 (4 hr) ng/mL</label><input type="number" step="0.1" value="${L.c4}" oninput="setLSS('c4',this.value)" placeholder="0.0"></div></div>
    ${wong!==null?`<div class="row">${badge("Wong AUC₀₋₁₂",wong,"µg·h/L",aucStatus(wong,tgt))}</div>`:""}
    ${L.c2!==""&&c2v>0?`<div class="alert" style="background:${c2Class(c2v).color}10;border:1px solid ${c2Class(c2v).color}30"><span style="font-weight:600;color:${c2Class(c2v).color}">C2 Peak: ${c2Class(c2v).label}</span></div>`:""}</div>`;

    // Scholten
    html += `<div class="card"><h3>Scholten Equation (C0 + C1 + C4)</h3>
    <div class="sub">AUC₀₋₁₂ = 8.90 + 4.0 × C0 + 1.77 × C1 + 5.47 × C4 &nbsp;|&nbsp; Wait: 4 hr &nbsp;|&nbsp; r² = 0.965</div>
    <div class="row"><div class="field"><label>C0 ng/mL</label><input type="number" step="0.1" value="${L.c0}" oninput="setLSS('c0',this.value)" placeholder="0.0"></div>
    <div class="field"><label>C1 (1 hr) ng/mL</label><input type="number" step="0.1" value="${L.c1}" oninput="setLSS('c1',this.value)" placeholder="0.0"></div>
    <div class="field"><label>C4 (4 hr) ng/mL</label><input type="number" step="0.1" value="${L.c4}" oninput="setLSS('c4',this.value)" placeholder="0.0"></div></div>
    ${schol!==null?`<div class="row">${badge("Scholten AUC₀₋₁₂",schol,"µg·h/L",aucStatus(schol,tgt))}</div>`:""}</div>`;

    // Comparison
    if (indian!==null||wong!==null||schol!==null) {
      html += `<div class="card" style="background:var(--bg)"><h3>Comparison</h3><div class="row" style="margin-top:8px">
      ${indian!==null?badge("Indian",indian,"µg·h/L",aucStatus(indian,tgt)):""}
      ${wong!==null?badge("Wong",wong,"µg·h/L",aucStatus(wong,tgt)):""}
      ${schol!==null?badge("Scholten",schol,"µg·h/L",aucStatus(schol,tgt)):""}
      </div></div>`;
    }
  }

  else if (state.tab === 1) {
    const fullVal = trapAUC(state.fullPts);
    html = phaseSelector();
    html += `<div class="card"><h3>Full 12-Hour PK Profile</h3><div class="sub">Linear-log trapezoidal rule. For PK study validation.</div>
    <div class="grid2">${state.fullPts.map((pt,i)=>`<div class="tp-input"><span>T=${pt.time}h</span><input type="number" step="0.1" value="${pt.conc}" oninput="setFP(${i},this.value)" placeholder="ng/mL"></div>`).join("")}</div>`;
    if (fullVal!==null) {
      html += `<div style="margin-top:12px">${badge("Measured AUC₀₋₁₂ (Trapezoidal)",fullVal,"µg·h/L",aucStatus(fullVal,tgt))}</div>`;
      const filled = state.fullPts.filter(p=>p.conc!==""&&parseFloat(p.conc)>0);
      if (filled.length>0) {
        const concs=filled.map(p=>parseFloat(p.conc)), times=filled.map(p=>parseFloat(p.time));
        const mx=Math.max(...concs), mxi=concs.indexOf(mx), tmx=times[mxi];
        const cv0=state.fullPts[0].conc!==""?parseFloat(state.fullPts[0].conc):null;
        const c12=state.fullPts[state.fullPts.length-1].conc!==""?parseFloat(state.fullPts[state.fullPts.length-1].conc):null;
        html += `<div class="pk-params"><strong>Derived PK Parameters:</strong><div class="pk-grid">
        <div>Cmax: <strong>${mx.toFixed(1)}</strong></div><div>Tmax: <strong>${tmx}h</strong></div>
        <div>C0: <strong>${cv0!==null?cv0.toFixed(1):"—"}</strong></div><div>C12: <strong>${c12!==null?c12.toFixed(1):"—"}</strong></div>
        ${cv0?`<div>Cmax/C0: <strong>${(mx/cv0).toFixed(1)}</strong></div>`:""}</div></div>`;
      }
    }
    html += `<button class="btn-clear" onclick="clearFP()">Clear All</button></div>`;
  }

  else if (state.tab === 2) {
    const CD = state.cd;
    const ratio = CD.c0!==""&&CD.dose!==""&&parseFloat(CD.dose)>0 ? parseFloat(CD.c0)/parseFloat(CD.dose) : null;
    const cls = ratio!==null ? cdClass(ratio) : null;
    html = `<div class="card"><h3>Tacrolimus C/D Ratio</h3><div class="sub">C/D = C0 (ng/mL) ÷ Total Daily Dose (mg). Calculate at every visit.</div>
    <div class="row"><div class="field"><label>Tac C0 (trough) ng/mL</label><input type="number" step="0.1" value="${CD.c0}" oninput="setCD('c0',this.value)" placeholder="0.0"></div>
    <div class="field"><label>Total Daily Dose mg</label><input type="number" step="0.5" value="${CD.dose}" oninput="setCD('dose',this.value)" placeholder="0.0"></div></div>
    ${ratio!==null?`${badge("C/D Ratio",ratio,"ng/mL per mg",{label:cls.label,color:cls.color})}
    <div class="alert" style="background:${cls.color}10;border:1px solid ${cls.color}30;margin-top:8px">
    <div style="font-weight:700;color:${cls.color}">${cls.label}</div><div style="margin-top:3px">${cls.action}</div></div>`:""}
    </div>`;
    html += `<div class="card"><h3>C/D Classification</h3><table><thead><tr><th>C/D Range</th><th>Class</th><th>India %</th><th>Action</th></tr></thead><tbody>
    <tr><td>≥1.55</td><td>Slow</td><td>40–50%</td><td>Standard protocol</td></tr>
    <tr><td>1.05–1.54</td><td>Intermediate</td><td>25–30%</td><td>Monitor — many behave as fast</td></tr>
    <tr><td>&lt;1.05</td><td>Fast</td><td>15–20%</td><td>Activate protocol</td></tr>
    <tr><td>&lt;0.8</td><td>Very Rapid</td><td>5–10%</td><td>Act urgently</td></tr>
    </tbody></table><p style="font-size:10px;color:var(--text2);margin-top:6px">~50–60% of Indian recipients are CYP3A5 expressers.</p></div>`;
  }

  else if (state.tab === 3) {
    html = `<div class="card"><h3>AUC Target Ranges</h3><table><thead><tr><th>Phase</th><th>AUC₀₋₁₂ (µg·h/L)</th><th>C0 (ng/mL)</th></tr></thead><tbody>
    ${TARGETS.map(t=>`<tr><td style="font-weight:600">${t.phase}</td><td>${t.min}–${t.max}</td><td>${t.c0Min}–${t.c0Max}</td></tr>`).join("")}</tbody></table></div>`;

    html += `<div class="card"><h3>AUC Interpretation Guide</h3><table><thead><tr><th>Finding</th><th>Meaning</th><th>Action</th></tr></thead><tbody>
    <tr><td style="font-weight:600">High AUC + High C0</td><td>Overexposure</td><td>Reduce dose</td></tr>
    <tr><td style="font-weight:600">High AUC + Low C0</td><td>Peak-trough mismatch</td><td>Reduce dose + reshape curve</td></tr>
    <tr><td style="font-weight:600">Normal AUC + High C2</td><td>Peak toxicity only</td><td>Reshape curve only (TDS/diltiazem)</td></tr>
    <tr><td style="font-weight:600">Low AUC + Low C0</td><td>Underexposed</td><td>Increase dose + add diltiazem</td></tr>
    <tr><td style="font-weight:600">Normal AUC + Low C0</td><td>Adequate exposure</td><td>Do NOT chase C0 upward</td></tr>
    </tbody></table></div>`;

    html += `<div class="card"><h3>C2 Peak Thresholds (CMIA)</h3><table><thead><tr><th>C2 (ng/mL)</th><th>Interpretation</th></tr></thead><tbody>
    <tr><td>10–20</td><td style="color:#27ae60;font-weight:600">Acceptable peak</td></tr>
    <tr><td>20–30</td><td style="color:#f39c12;font-weight:600">Probable peak toxicity — intervene</td></tr>
    <tr><td>&gt;30</td><td style="color:#e74c3c;font-weight:600">URGENT — toxic spikes every dose</td></tr>
    </tbody></table><p style="font-size:9px;color:var(--text2);margin-top:4px">CMIA reads 15–25% higher than LC-MS/MS.</p></div>`;

    html += `<div class="card"><h3>LSS Equations</h3><div style="font-size:11px;line-height:1.9">
    <div><strong>Indian:</strong> AUC₀₋₁₂ = 19.16 + 6.75×C0 + 3.33×C1.5 <span style="color:var(--text2)">| Joshi 2003 | r²=0.929</span></div>
    <div><strong>Wong:</strong> AUC₀₋₁₂ = 16.2 + 2.4×C2 + 5.9×C4 <span style="color:var(--text2)">| Wong 2000 | r²=0.93 | CMIA</span></div>
    <div><strong>Scholten:</strong> AUC₀₋₁₂ = 8.90 + 4.0×C0 + 1.77×C1 + 5.47×C4 <span style="color:var(--text2)">| Scholten 2005 | r²=0.965</span></div>
    </div></div>`;

    html += `<div class="card"><h3>Stepwise Intervention</h3><div class="interp-section">
    <div><strong>Step 1:</strong> Lock brand + strict fasting</div>
    <div><strong>Step 2:</strong> Add diltiazem CD 120 mg OD (or SR 90 / IR 30 TDS)</div>
    <div><strong>Step 3:</strong> TDS split (same dose ÷ 3, q8h)</div>
    <div><strong>Step 4:</strong> Ketoconazole 50–100 mg (selected centers)</div>
    <div><strong>Step 5:</strong> mTORi + low-dose tac (month 3+)</div></div></div>`;
  }

  $("content").innerHTML = html;
}

function setTab(i) { state.tab=i; render(); }
function setPhase(i) { state.phase=i; render(); }
function setLSS(k,v) { state.lss[k]=v; render(); }
function setCD(k,v) { state.cd[k]=v; render(); }
function setFP(i,v) { state.fullPts[i].conc=v; render(); }
function clearFP() { state.fullPts.forEach(p=>p.conc=""); render(); }

render();
</script>
</body>
</html>
